<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Menù Giornaliero • ContaCarbo (v1.0.0)</title>
  <style>
    :root{ --bg:#0f1220; --card:#161a2b; --muted:#8ca0c0; --text:#eef1ff; --accent:#4da3ff; --warn:#ffd166; --ok:#7be495; }
    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html,body{ margin:0; padding:0; background:var(--bg); color:var(--text); font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;}
    header{ position:sticky; top:0; background:#0f1220d9; backdrop-filter:blur(8px); border-bottom:1px solid #1f2540; z-index:10 }
    .wrap{ max-width:860px; margin:0 auto; padding:12px 14px }
    h1{ margin:0 0 6px; font-size:1.1rem }
    .toolbar{ display:flex; gap:8px; flex-wrap:wrap; align-items:center }
    input,button,select{ background:var(--card); color:var(--text); border:1px solid #2a3154; border-radius:12px; padding:10px 12px; font-size:16px; }
    button{ cursor:pointer }
    button.primary{ background:var(--accent); border-color:transparent; color:#00122a; font-weight:700 }
    main{ padding:10px 14px }
    .day{ background:var(--card); border:1px solid #1f2540; border-radius:16px; padding:12px }
    .day h2{ margin:0 0 2px; font-size:1.05rem }
    .sub{ color:var(--muted); font-size:.9rem; margin:0 0 8px }
    .meal{ margin-top:12px; border-top:1px dashed #2a3154; padding-top:8px }
    .meal h3{ margin:0 0 8px; font-size:.95rem; color:var(--muted) }
    .item{ display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; padding:10px; border:1px solid #2a3154; border-radius:12px; background:#1a2038; margin:6px 0 }
    .title{ font-weight:600 }
    .right{ text-align:right }
    .chip{ display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:3px 10px; border:1px solid #35537a; background:#1a2740; color:#bcd9ff; font-size:.8rem }
    .note{ font-size:.85rem; color:var(--muted) }
    .tot{ display:flex; justify-content:space-between; padding:10px; border-radius:12px; background:#0f1934; border:1px solid #243158; margin-top:8px; font-weight:700 }
    .tot .val{ font-variant-numeric: tabular-nums }
    .footer{ color:var(--muted); font-size:.85rem; margin:12px 0; text-align:center }
    .pill{ display:inline-block; padding:2px 8px; border-radius:999px; background:#142042; border:1px solid #2b3c6b; font-size:.75rem }
    .row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap }
    .g-input{ width:120px; }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Menù Giornaliero <span class="pill">v1.0.0</span></h1>
      <div class="toolbar">
        <label>Settimana: <input type="week" id="week"></label>
        <label>Giorno:
          <select id="daySelect">
            <option value="0">Lunedì</option>
            <option value="1">Martedì</option>
            <option value="2">Mercoledì</option>
            <option value="3">Giovedì</option>
            <option value="4">Venerdì</option>
            <option value="5">Sabato</option>
            <option value="6">Domenica</option>
          </select>
        </label>
        <button class="primary" id="loadCurrent">Menù corrente</button>
        <button id="loadWeek">Carica</button>
        <span id="status" class="muted"></span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="day" id="dayBox" hidden>
      <h2 id="dayTitle">—</h2>
      <p class="sub" id="periodLabel"></p>
      <div id="meals"></div>
      <div class="tot" id="dayTotal" hidden>
        <span>Totale carbo di oggi</span>
        <span class="val" id="totalGr">0 g</span>
      </div>
    </section>
    <p class="footer">
      I pesi inseriti si salvano solo su questo dispositivo. <br>
      Database carbo da <code>alimenti.json</code>.
    </p>
  </main>

  <script>
  (() => {
    const VERSION = "1.0.0";
    const STORAGE_KEY = "menu-giorno-v" + VERSION;
    const dayNames = ["Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato","Domenica"];
    const mealOrder = ["colazione","pranzo","cena","snack"];
    const mealNames = {colazione:"Colazione", pranzo:"Pranzo", cena:"Cena", snack:"Snack"};

    const statusEl = document.getElementById('status');
    const dayBox = document.getElementById('dayBox');
    const dayTitle = document.getElementById('dayTitle');
    const periodLabel = document.getElementById('periodLabel');
    const mealsRoot = document.getElementById('meals');
    const totalBox = document.getElementById('dayTotal');
    const totalVal = document.getElementById('totalGr');

    const weekInput = document.getElementById('week');
    const daySelect = document.getElementById('daySelect');

    // util
    function getCurrentWeekValue(date=new Date()){
      const y = date.getUTCFullYear();
      const oneJan = new Date(Date.UTC(y,0,1));
      const dayNum = Math.floor((date - oneJan)/86400000) + 1;
      const week = Math.ceil((dayNum + (oneJan.getUTCDay()+6)%7) / 7);
      return `${y}-W${String(week).padStart(2,'0')}`;
    }
    weekInput.value = getCurrentWeekValue();

    function loadState(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}"); }catch(e){ return {}; } }
    function saveState(s){ localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
    function keyFor(wk,dayIdx,meal,name){ return `${wk}|${dayIdx}|${meal}|${name}`.toLowerCase(); }

    // DB carbo (fallback minimale)
    let carbsDB = {"pasta":75,"riso":79,"patate":17,"pizza":50,"pane":54,"crackers":67,"yogurt":5,"gelato":26,"budino":20,"anguria":8,"pesca":10,"zucchine":3,"insalata":3,"nuggets":15};
    function norm(s){ return (s||"").toLowerCase().normalize('NFD').replace(/\p{Diacritic}/gu,'').trim(); }
    async function loadCarbsDB(){
      try{
        const res = await fetch('../alimenti.json',{cache:'no-store'});
        if(!res.ok) throw new Error();
        const data = await res.json();
        carbsDB = {};
        if(Array.isArray(data)){
          data.forEach(it=>{
            const n = norm(it.nome||it.name||it.alimento);
            const c = Number(it.carbo_100||it.carboidrati||it.carb);
            if(n && !Number.isNaN(c)) carbsDB[n]=c;
          });
        }
      }catch{ /* fallback già definito */ }
    }
    function guessCarbsPer100(name){
      const n=norm(name);
      if(carbsDB[n]!=null) return carbsDB[n];
      for(const [k,v] of Object.entries(carbsDB)){ if(n.includes(k)) return v; }
      return 0;
    }
    function formatCarbs(c){ return `${(Math.round(c*10)/10).toFixed(1)} g`; }

    function renderDay(data, dayIdx){
      dayBox.hidden=false;
      dayTitle.textContent=`${dayNames[dayIdx]} • ${data.week||''}`;
      periodLabel.textContent=data.period||'';
      mealsRoot.innerHTML="";
      let state=loadState();
      let wk=data.week||"current";
      let grand=0;

      mealOrder.forEach(meal=>{
        const items=data.menu?.[dayIdx]?.[meal]||[];
        if(items.length===0) return;
        const sec=document.createElement('section');
        sec.className='meal';
        sec.innerHTML=`<h3>${mealNames[meal]}</h3>`;
        let mealTot=0;

        items.forEach(item=>{
          const row=document.createElement('div'); row.className='item';
          const left=document.createElement('div'); left.className='title'; left.textContent=item.name||'';
          const right=document.createElement('div'); right.className='right';

          if(item.weigh){
            const gramsKey=keyFor(wk,dayIdx,meal,item.name);
            const grams=Number(state[gramsKey]?.g||'');
            const c100=guessCarbsPer100(item.name);
            const gInput=document.createElement('input');
            gInput.type='number'; gInput.inputmode='decimal'; gInput.placeholder='g'; gInput.className='g-input';
            if(grams) gInput.value=grams;
            const cInput=document.createElement('input');
            cInput.type='number'; cInput.inputmode='decimal'; cInput.placeholder='carbo/100g'; cInput.style.width='120px'; cInput.value=c100||0;
            const chip=document.createElement('span'); chip.className='chip'; chip.textContent='PESARE';
            const row1=document.createElement('div'); row1.className='row'; row1.append(chip,gInput,cInput);
            const row2=document.createElement('div'); row2.className='row';
            const note=document.createElement('span'); note.className='note'; note.textContent=item.note||''; 
            const carbOut=document.createElement('strong'); carbOut.style.marginLeft='auto';
            function recalc(){ const g=Number(gInput.value||0); const c=Number(cInput.value||0); const carb=g*c/100; carbOut.textContent=formatCarbs(carb); state[gramsKey]={g}; saveState(state); computeTotals(); }
            gInput.addEventListener('input',recalc); cInput.addEventListener('input',recalc);
            row2.append(note,carbOut);
            right.append(row1,row2);
            row.append(left,right); sec.appendChild(row);
          }else{
            const note=document.createElement('div'); note.className='note'; note.textContent=item.note||'';
            right.append(note); row.append(left,right); sec.appendChild(row);
          }
        });
        mealsRoot.appendChild(sec);
      });
      computeTotals();
    }

    function computeTotals(){
      let total=0;
      mealsRoot.querySelectorAll('.meal').forEach(meal=>{
        let m=0;
        meal.querySelectorAll('.item').forEach(it=>{
          const inputs=it.querySelectorAll('input'); if(inputs.length>=2){ const g=Number(inputs[0].value||0); const c=Number(inputs[1].value||0); if(g&&c) m+=g*c/100; }
        });
        if(m>0){ const sub=document.createElement('div'); sub.className='tot'; sub.innerHTML=`<span>Totale</span><span class="val">${formatCarbs(m)}</span>`; meal.appendChild(sub); total+=m; }
      });
      if(total>0){ totalBox.hidden=false; totalVal.textContent=formatCarbs(total); } else { totalBox.hidden=true; }
    }

    async function loadJSON(path){ const r=await fetch(path,{cache:'no-store'}); if(!r.ok) throw new Error(r.status); return r.json(); }
    async function loadCurrent(){ statusEl.textContent="Carico..."; try{ const d=await loadJSON('menu_current.json'); renderDay(d,parseInt(daySelect.value)); statusEl.textContent="OK"; if(d.week) weekInput.value=d.week; }catch(e){ statusEl.textContent="Errore: "+e.message; } }
    async function loadWeek(){ const wk=weekInput.value; try{ const d=await loadJSON('menu_'+wk+'.json'); renderDay(d,parseInt(daySelect.value)); statusEl.textContent="OK"; }catch(e){ statusEl.textContent="Errore"; } }

    document.getElementById('loadCurrent').onclick=loadCurrent;
    document.getElementById('loadWeek').onclick=loadWeek;

    loadCarbsDB().then(loadCurrent);
  })();
  </script>
</body>
</html>
