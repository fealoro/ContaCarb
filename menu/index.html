<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Menù Giornaliero • ContaCarbo</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 20px; background:#f8f8f8; color:#333; }
    h1 { text-align:center; margin-bottom:12px; }
    .toolbar { text-align:center; margin-bottom:20px; }
    select, input, button { padding:8px 12px; margin:4px; border-radius:8px; border:1px solid #ccc; }
    .day { max-width:500px; margin:auto; background:white; border-radius:16px; padding:16px; box-shadow:0 2px 6px rgba(0,0,0,.1);}
    .day h2 { margin-top:0; font-size:1.2rem; }
    .meal { margin-top:14px; border-top:1px dashed #ddd; padding-top:8px; }
    .meal h3 { margin:0 0 6px; font-size:1rem; color:#555; }
    .item { display:flex; justify-content:space-between; margin:4px 0; padding:6px 8px; border:1px solid #eee; border-radius:8px; background:#fafafa; }
    .badge { font-size:.75rem; padding:2px 6px; border-radius:6px; background:#ffd166; color:#000; margin-left:6px; }
    .muted { color:#888; font-size:.9rem; }
  </style>
</head>
<body>
  <h1>Menù Giornaliero</h1>
  <div class="toolbar">
    <label>Settimana: <input type="week" id="week"></label>
    <label>Giorno: 
      <select id="daySelect">
        <option value="0">Lunedì</option>
        <option value="1">Martedì</option>
        <option value="2">Mercoledì</option>
        <option value="3">Giovedì</option>
        <option value="4">Venerdì</option>
        <option value="5">Sabato</option>
        <option value="6">Domenica</option>
      </select>
    </label>
    <button id="loadCurrent">Menù corrente</button>
    <button id="loadWeek">Carica</button>
    <div id="status" class="muted"></div>
  </div>

  <div id="output"></div>

  <script>
    const days = ["Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato","Domenica"];
    const meals = ["colazione","pranzo","cena","snack"];
    const output = document.getElementById('output');
    const statusEl = document.getElementById('status');
    const weekInput = document.getElementById('week');
    const daySelect = document.getElementById('daySelect');

    function getCurrentWeekValue(date=new Date()){
      const y = date.getUTCFullYear();
      const oneJan = new Date(Date.UTC(y,0,1));
      const dayNum = Math.floor((date - oneJan)/86400000) + 1;
      const week = Math.ceil((dayNum + (oneJan.getUTCDay()+6)%7) / 7);
      return `${y}-W${String(week).padStart(2,'0')}`;
    }
    weekInput.value = getCurrentWeekValue();

    async function fetchJSON(file){
      const res = await fetch(file,{cache:'no-store'});
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function renderDay(data, dayIdx){
      output.innerHTML = "";
      const day = data.menu?.[dayIdx];
      if(!day){ output.innerHTML = "<p>Nessun dato per questo giorno.</p>"; return; }
      const box = document.createElement('div');
      box.className = 'day';
      box.innerHTML = `<h2>${days[dayIdx]} — ${data.period||data.week||''}</h2>`;
      meals.forEach(m=>{
        const items = day[m]||[];
        const sec = document.createElement('div');
        sec.className='meal';
        sec.innerHTML = `<h3>${m.charAt(0).toUpperCase()+m.slice(1)}</h3>`;
        if(items.length===0){
          sec.innerHTML += "<p class='muted'>—</p>";
        } else {
          items.forEach(it=>{
            const row = document.createElement('div');
            row.className='item';
            row.innerHTML = `<span>${it.name}</span><span>${it.weigh?'<span class="badge">PESARE</span>':''} ${it.note||''}</span>`;
            sec.appendChild(row);
          });
        }
        box.appendChild(sec);
      });
      output.appendChild(box);
    }

    async function loadCurrent(){
      try{
        statusEl.textContent="Carico menu_current.json…";
        const data = await fetchJSON('menu_current.json');
        renderDay(data, parseInt(daySelect.value));
        if(data.week) weekInput.value = data.week;
        statusEl.textContent="OK";
      }catch(e){ statusEl.textContent="Errore: "+e.message; }
    }
    async function loadByWeek(){
      try{
        const week = weekInput.value;
        const file = `menu_${week}.json`;
        statusEl.textContent="Carico "+file+"…";
        const data = await fetchJSON(file);
        renderDay(data, parseInt(daySelect.value));
        statusEl.textContent="OK";
      }catch(e){ statusEl.textContent="Errore: "+e.message; }
    }

    document.getElementById('loadCurrent').onclick = loadCurrent;
    document.getElementById('loadWeek').onclick = loadByWeek;
  </script>
</body>
</html>
