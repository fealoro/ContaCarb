<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Menù Giornaliero • ContaCarbo (v1.3.2)</title>
  <style>
    body {font-family: system-ui, sans-serif; margin:0; padding:20px; background:#f8f8f8; color:#333;}
    h1 {text-align:center; font-size:1.2em; margin-bottom:10px;}
    .toolbar {text-align:center; margin-bottom:20px;}
    select {padding:8px 12px; font-size:1em; border-radius:8px; border:1px solid #ccc;}
    .day {max-width:500px; margin:auto; background:white; border-radius:16px; padding:16px; box-shadow:0 2px 6px rgba(0,0,0,0.1);}
    .day h2 {margin-top:0;}
    .meal {margin-top:14px; border-top:1px solid #ddd; padding-top:8px;}
    .meal h3 {margin:0 0 8px; font-size:1em; color:#666;}
    .item {padding:6px 10px; border-radius:8px; margin:4px 0; background:#f2f2f2; display:flex; justify-content:space-between;}
    .badge {font-size:.75em; padding:2px 6px; border-radius:6px; background:#ffd166; margin-left:8px;}
  </style>
</head>
<body>
  <h1>Menù Giornaliero</h1>
  <div class="toolbar">
    <label for="daySelect">Giorno:</label>
    <select id="daySelect">
      <option value="0">Lunedì</option>
      <option value="1">Martedì</option>
      <option value="2">Mercoledì</option>
      <option value="3">Giovedì</option>
      <option value="4">Venerdì</option>
      <option value="5">Sabato</option>
      <option value="6">Domenica</option>
    </select>
  </div>
  <div class="day" id="dayBox" hidden>
    <h2 id="dayTitle"></h2>
    <p id="periodLabel"></p>
    <div id="meals"></div>
  </div>

<script>
(async()=>{
  const dayNames = ["Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato","Domenica"];
  const mealOrder = ["colazione","pranzo","cena","snack"];
  const mealNames = {colazione:"Colazione", pranzo:"Pranzo", cena:"Cena", snack:"Snack"};

  const sel = document.getElementById('daySelect');
  const dayBox = document.getElementById('dayBox');
  const dayTitle = document.getElementById('dayTitle');
  const periodLabel = document.getElementById('periodLabel');
  const mealsRoot = document.getElementById('meals');

  let MENU = null;
  try {
    const res = await fetch('menu_current.json',{cache:'no-store'});
    MENU = await res.json();
  } catch(e) {
    document.body.innerHTML = "<p>Errore nel caricamento di menu_current.json</p>";
    return;
  }

  function renderDay(idx){
    dayBox.hidden=false;
    dayTitle.textContent = dayNames[idx] + (MENU.week? " • " + MENU.week : "");
    periodLabel.textContent = MENU.period || "";
    mealsRoot.innerHTML="";
    const data = MENU.menu?.[idx] || {};
    mealOrder.forEach(m=>{
      const items = data[m] || [];
      if(items.length===0) return;
      const sec = document.createElement('div');
      sec.className='meal';
      sec.innerHTML = `<h3>${mealNames[m]}</h3>`;
      items.forEach(it=>{
        const row=document.createElement('div');
        row.className='item';
        const left=document.createElement('span');
        left.textContent=it.name;
        if(it.weigh){ 
          const b=document.createElement('span'); b.className='badge'; b.textContent='PESARE'; left.appendChild(b);
        }
        row.append(left);
        sec.appendChild(row);
      });
      mealsRoot.appendChild(sec);
    });
  }

  sel.addEventListener('change', ()=> renderDay(parseInt(sel.value,10)));
  renderDay(parseInt(sel.value,10));
})();
</script>
</body>
</html>
