<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Menù Giornaliero • ContaCarbo (v1.0.0)</title>
  <style>
    :root{ --bg:#0f1220; --card:#161a2b; --muted:#8ca0c0; --text:#eef1ff; --accent:#4da3ff; --warn:#ffd166; --ok:#7be495; }
    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html,body{ margin:0; padding:0; background:var(--bg); color:var(--text); font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;}
    header{ position:sticky; top:0; background:#0f1220d9; backdrop-filter:blur(8px); border-bottom:1px solid #1f2540; z-index:10 }
    .wrap{ max-width:860px; margin:0 auto; padding:12px 14px }
    h1{ margin:0 0 6px; font-size:1.1rem }
    .toolbar{ display:flex; gap:8px; flex-wrap:wrap; align-items:center }
    input,button,select{ background:var(--card); color:var(--text); border:1px solid #2a3154; border-radius:12px; padding:10px 12px; font-size:16px; }
    button{ cursor:pointer }
    button.primary{ background:var(--accent); border-color:transparent; color:#00122a; font-weight:700 }
    main{ padding:10px 14px }
    .day{ background:var(--card); border:1px solid #1f2540; border-radius:16px; padding:12px }
    .day h2{ margin:0 0 2px; font-size:1.05rem }
    .sub{ color:var(--muted); font-size:.9rem; margin:0 0 8px }
    .meal{ margin-top:12px; border-top:1px dashed #2a3154; padding-top:8px }
    .meal h3{ margin:0 0 8px; font-size:.95rem; color:var(--muted) }
    .item{ display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; padding:10px; border:1px solid #2a3154; border-radius:12px; background:#1a2038; margin:6px 0 }
    .title{ font-weight:600 }
    .right{ text-align:right }
    .chip{ display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:3px 10px; border:1px solid #35537a; background:#1a2740; color:#bcd9ff; font-size:.8rem }
    .note{ font-size:.85rem; color:var(--muted) }
    .tot{ display:flex; justify-content:space-between; padding:10px; border-radius:12px; background:#0f1934; border:1px solid #243158; margin-top:8px; font-weight:700 }
    .tot .val{ font-variant-numeric: tabular-nums }
    .footer{ color:var(--muted); font-size:.85rem; margin:12px 0; text-align:center }
    .pill{ display:inline-block; padding:2px 8px; border-radius:999px; background:#142042; border:1px solid #2b3c6b; font-size:.75rem }
    .row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap }
    .g-input{ width:120px; }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Menù Giornaliero <span class="pill">v1.0.0</span></h1>
      <div class="toolbar">
        <label>Settimana: <input type="week" id="week"></label>
        <label>Giorno:
          <select id="daySelect">
            <option value="0">Lunedì</option>
            <option value="1">Martedì</option>
            <option value="2">Mercoledì</option>
            <option value="3">Giovedì</option>
            <option value="4">Venerdì</option>
            <option value="5">Sabato</option>
            <option value="6">Domenica</option>
          </select>
        </label>
        <button class="primary" id="loadCurrent">Menù corrente</button>
        <button id="loadWeek">Carica</button>
        <span id="status" class="muted"></span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="day" id="dayBox" hidden>
      <h2 id="dayTitle">—</h2>
      <p class="sub" id="periodLabel"></p>
      <div id="meals"></div>
      <div class="tot" id="dayTotal" hidden>
        <span>Totale carbo di oggi</span>
        <span class="val" id="totalGr">0 g</span>
      </div>
    </section>
    <p class="footer">
      I pesi inseriti si salvano solo su questo dispositivo. <br>
      Database carbo da <code>alimenti.json</code>.
    </p>
  </main>

  <script>
    // ... [JS come nella versione che ti ho preparato: gestione giorni, pasti, input g, carb/100g, totali] ...
  </script>
</body>
</html>
